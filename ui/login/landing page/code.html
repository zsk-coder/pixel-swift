<!-- Header -->
<div class="p-4 bg-surface-container-low/50">
<div class="flex items-center gap-3">

<div class="flex flex-col">

</div>

<span class="px-2 py-0.5 rounded-full bg-surface-container-high text-xs font-bold text-on-surface-variant">Free</span>
